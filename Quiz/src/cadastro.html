<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Track - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../CSS/index.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body class="login-page">

    <img src="../imgs/Logo.png" alt="Logo do Vibe Track" class="logo">

    <div class="login-wrapper">

        <div class="login-header">
            <h1 class="login-titulo">Cadastrar-se</h1>
            <p class="login-sub">Crie sua conta para jogar</p>
        </div>

        <div class="login-form">

            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome">
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••">
            </div>

            <p class="msg-erro" id="msg-erro"></p>
            <p class="msg-sucesso" id="msg-sucesso"></p>

            <button class="btn-entrar" id="btn-cadastrar">Cadastrar</button>

            <p class="link-cadastro">
                Já tem conta? <a href="login.html">Entrar</a>
            </p>

        </div>

    </div>

    <script src="../JS/cadastro.js"></script>
</body>
</html>
