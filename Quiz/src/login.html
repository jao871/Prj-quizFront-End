<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Track - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../CSS/index.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body class="login-page">

    <img src="../imgs/Logo.png" alt="Logo do Vibe Track" class="logo">

    <div class="login-wrapper">

        <div class="login-header">
            <h1 class="login-titulo">Entrar</h1>
            <p class="login-sub">Acesse sua conta para continuar</p>
        </div>

        <div class="login-form">

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="off">
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••">
            </div>

            <p class="msg-erro" id="msg-erro"></p>

            <button class="btn-entrar" id="btn-entrar">Entrar</button>

            <p class="link-cadastro">
                Não tem conta? <a href="cadastro.html">Cadastre-se</a>
            </p>

        </div>

    </div>

    <script src="../JS/login.js"></script>
</body>
</html>
